    return e;
  }
  function rand(a, b) { return a + Math.random() * (b - a); }
  function randn() {
    var u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }
  function clamp(x, lo, hi) { return x < lo ? lo : x > hi ? hi : x; }

  var defs = document.getElementById("defs");
  var raysG = document.getElementById("rays");
  var bgG = document.getElementById("bg");
  var tickerG = document.getElementById("ticker");
  var eyesG = document.getElementById("eyes");
  var topG = document.getElementById("top");

  // -- defs: halftone stipple + iris vignette --------------------------------
  var pat = el("pattern", { id: "halftone", width: 5, height: 5, patternUnits: "userSpaceOnUse" });
  pat.appendChild(el("rect", { width: 5, height: 5, fill: GROUND }));
  pat.appendChild(el("circle", { cx: 1.25, cy: 1.25, r: 0.85, fill: "#d6d6d6", "fill-opacity": 0.85 }));
  pat.appendChild(el("circle", { cx: 3.75, cy: 3.75, r: 0.85, fill: "#d6d6d6", "fill-opacity": 0.85 }));
  defs.appendChild(pat);

  var grad = el("radialGradient", { id: "irisShadow" });
  grad.appendChild(el("stop", { offset: "0.28", "stop-color": GROUND, "stop-opacity": 0 }));
  grad.appendChild(el("stop", { offset: "0.82", "stop-color": GROUND, "stop-opacity": 0.5 }));
  grad.appendChild(el("stop", { offset: "1", "stop-color": GROUND, "stop-opacity": 0.92 }));
  defs.appendChild(grad);

  // -- background: rays, rings, nodes, chevrons ------------------------------
  var RAYN = 48;
  for (var k = 0; k < RAYN; k++) {
    var a = k * (Math.PI * 2 / RAYN);
    var r0 = 94, r1 = (k % 2 === 0) ? 252 : 214;
    raysG.appendChild(el("line", {
      x1: CX + r0 * Math.cos(a), y1: CY + r0 * Math.sin(a),
      x2: CX + r1 * Math.cos(a), y2: CY + r1 * Math.sin(a),
      stroke: INK, "stroke-width": 1, "stroke-opacity": 0.16,
      "stroke-dasharray": (k % 2 === 0) ? "2 5" : "1 5"
    }));
  }
  bgG.appendChild(el("circle", { cx: CX, cy: CY, r: 150, fill: "none", stroke: INK, "stroke-opacity": 0.13, "stroke-width": 1, "stroke-dasharray": "3 5" }));
  bgG.appendChild(el("circle", { cx: CX, cy: CY, r: 238, fill: "none", stroke: INK, "stroke-opacity": 0.10, "stroke-width": 1, "stroke-dasharray": "3 6" }));
  bgG.appendChild(el("line", { x1: CX, y1: 60, x2: CX, y2: 540, stroke: INK, "stroke-opacity": 0.07, "stroke-width": 1, "stroke-dasharray": "2 7" }));

  [238].forEach(function (r) {   // inner (r=150) nodes landed on the axis eyes' tips — dropped
    [CX - r, CX + r].forEach(function (x) {
      bgG.appendChild(el("circle", { cx: x, cy: CY, r: 4, fill: "none", stroke: INK, "stroke-opacity": 0.4, "stroke-width": 1 }));
      bgG.appendChild(el("circle", { cx: x, cy: CY, r: 1.1, fill: INK, "fill-opacity": 0.6 }));
    });
  });
  function chevron(y, dir) {
    bgG.appendChild(el("polyline", {
      points: (CX - 9) + "," + (y + dir * 8) + " " + CX + "," + y + " " + (CX + 9) + "," + (y + dir * 8),
      fill: "none", stroke: INK, "stroke-opacity": 0.42, "stroke-width": 1.2, "stroke-linecap": "round", "stroke-linejoin": "round"
    }));
  }
  chevron(58, 1);    // up chevron near top
  chevron(542, -1);  // down chevron near bottom

  // -- ticker line (behind the eyes) -----------------------------------------
  var XL = 42, XR = 560, BASE = 300, SCALE = 3.25, SP = 8, SAMPLE_MS = 95;
  var YLO = 168, YHI = 432;                          // wider vertical swing
  var VOL = 2.0, MR = 0.022, PLO = 60, PHI = 140;    // volatility, mean-reversion, price clamp
  for (var gx = XL; gx <= XR; gx += 40) {
    tickerG.appendChild(el("line", { x1: gx, y1: 150, x2: gx, y2: 450, stroke: INK, "stroke-opacity": 0.05, "stroke-width": 1, "stroke-dasharray": "2 7" }));
  }
  tickerG.appendChild(el("line", { x1: XL, y1: BASE, x2: XR, y2: BASE, stroke: INK, "stroke-opacity": 0.18, "stroke-width": 1, "stroke-dasharray": "4 6" }));

  var N = Math.ceil((XR - XL) / SP) + 2;
  var segs = [];                                     // one line per step, green up / red down
  for (var si = 0; si < N; si++) {
    var seg = el("line", { x1: 0, y1: 0, x2: 0, y2: 0, "stroke-width": 1.4, "stroke-opacity": 0.85, "stroke-linecap": "round" });
    tickerG.appendChild(seg);
    segs.push(seg);
  }

  function mapY(p) { return clamp(BASE - (p - 100) * SCALE, YLO, YHI); }

  var prices = [100];
  for (var s = 1; s < N; s++) {
    var p = prices[s - 1] + (-MR * (prices[s - 1] - 100)) + randn() * VOL;
    prices.push(clamp(p, PLO, PHI));
  }
  var dir = 1;

  // -- eyes -------------------------------------------------------------------
  function buildEye(i, cx, cy, w, h) {
    var g = el("g", { transform: "translate(" + cx + "," + cy + ")" });
    var almond = "M " + (-w) + ",0 Q 0," + (-h) + " " + w + ",0 Q 0," + h + " " + (-w) + ",0 Z";

    var cp = el("clipPath", { id: "eclip" + i });
    cp.appendChild(el("path", { d: almond }));
    defs.appendChild(cp);
    var clipRef = "url(#eclip" + i + ")";
    var irisR = h * 0.92;
    var pupilR = irisR * 0.44;

    var irisG = el("g", { "clip-path": clipRef });
    irisG.appendChild(el("circle", { cx: 0, cy: 0, r: irisR, fill: "url(#halftone)" }));
    irisG.appendChild(el("circle", { cx: 0, cy: 0, r: irisR, fill: "url(#irisShadow)" }));
    g.appendChild(irisG);

    var gaze = el("g", { transform: "translate(0,0)" });
    gaze.appendChild(el("circle", { cx: 0, cy: 0, r: pupilR, fill: GROUND, stroke: INK, "stroke-opacity": 0.16, "stroke-width": 0.6 }));
    g.appendChild(gaze);

    var lidG = el("g", { "clip-path": clipRef });
    var topLid = el("rect", { x: -w - 2, y: -h - 2, width: 2 * w + 4, height: 0, fill: GROUND });
    var botLid = el("rect", { x: -w - 2, y: h + 2, width: 2 * w + 4, height: 0, fill: GROUND });
    lidG.appendChild(topLid); lidG.appendChild(botLid);
    g.appendChild(lidG);

    g.appendChild(el("path", { d: almond, fill: "none", stroke: INK, "stroke-width": 1.1, "stroke-opacity": 0.85, "stroke-dasharray": "4 3", "stroke-linejoin": "round" }));
    g.appendChild(el("path", {
      d: "M " + (-w * 0.7) + "," + (-h * 0.02) + " Q 0," + (-h * 0.72) + " " + (w * 0.7) + "," + (-h * 0.02),
      fill: "none", stroke: INK, "stroke-width": 0.7, "stroke-opacity": 0.3, "stroke-dasharray": "2 3"
    }));
    eyesG.appendChild(g);

    return {
      gaze: gaze, topLid: topLid, botLid: botLid, h: h,
      maxOff: irisR - pupilR - 1.5,
      gx: 0, gy: 0, tx: 0, ty: 0, nextGaze: rand(0, 1.4),
      p: 0, bstate: "idle", bt: 0, nextBlink: rand(2.5, 6.5)
    };
  }

  var layout = [{ cx: CX, cy: CY, w: 72, h: 44 }];
  for (var i6 = 0; i6 < 6; i6++) {
    var a6 = i6 * Math.PI / 3;
    var r6 = (i6 === 0 || i6 === 3) ? 148 : 118;   // ease the two flanking the wide center eye outward
    layout.push({ cx: CX + r6 * Math.cos(a6), cy: CY + r6 * Math.sin(a6), w: 40, h: 24 });
  }
  for (var i12 = 0; i12 < 12; i12++) {
    var a12 = (i12 * 30 + 15) * Math.PI / 180;
    layout.push({ cx: CX + 208 * Math.cos(a12), cy: CY + 208 * Math.sin(a12), w: 31, h: 19 });
  }
  var eyes = layout.map(function (e, idx) { return buildEye(idx, e.cx, e.cy, e.w, e.h); });

  // -- now-marker + labels (above the eyes) ----------------------------------
  var marker = el("g", { transform: "translate(" + XR + "," + BASE + ")" });
  var glowOuter = el("circle", { r: 15, fill: UP, "fill-opacity": 0.12 });
  var glowMid = el("circle", { r: 9, fill: UP, "fill-opacity": 0.22 });
  var ring = el("circle", { r: 6, fill: "none", stroke: UP, "stroke-width": 1, "stroke-opacity": 0.65 });
  var dot = el("circle", { r: 3, fill: UP });
  var arrow = el("path", { d: "M 0,-13 L 4,-6 L -4,-6 Z", fill: UP });
  [glowOuter, glowMid, ring, dot, arrow].forEach(function (n) { marker.appendChild(n); });
  topG.appendChild(marker);

  topG.appendChild(el("text", { x: 36, y: 52, "font-size": 13, "letter-spacing": 2, "fill-opacity": 0.5 })).textContent = "ARGVS \u00B7 PANOPTES";
  var trLabel = el("text", { x: 564, y: 52, "font-size": 10, "letter-spacing": 3, "text-anchor": "end", "fill-opacity": 0.32 });
  trLabel.textContent = "THE ALL-SEEING INDEX";
  topG.appendChild(trLabel);
  var liveDot = el("circle", { cx: 40, cy: 551, r: 2.6, fill: UP });
  topG.appendChild(liveDot);
  topG.appendChild(el("text", { x: 50, y: 555, "font-size": 10, "letter-spacing": 2, "fill-opacity": 0.4 })).textContent = "LIVE";
  var priceLabel = el("text", { x: 564, y: 555, "font-size": 14, "letter-spacing": 1, "text-anchor": "end", fill: UP });
  priceLabel.textContent = "100.0";
  topG.appendChild(priceLabel);

  function setMarkerColor(c, up) {
    glowOuter.setAttribute("fill", c);
    glowMid.setAttribute("fill", c);
    ring.setAttribute("stroke", c);
    dot.setAttribute("fill", c);
    arrow.setAttribute("fill", c);
    arrow.setAttribute("d", up ? "M 0,-13 L 4,-6 L -4,-6 Z" : "M 0,13 L 4,6 L -4,6 Z");
    priceLabel.setAttribute("fill", c);
    liveDot.setAttribute("fill", c);
  }

  function step() {
    var prev = prices[prices.length - 1];
    var np = prev + (-MR * (prev - 100)) + randn() * VOL;
    np = clamp(np, PLO, PHI);
    if (np > prev + 0.02) dir = 1; else if (np < prev - 0.02) dir = -1;
    prices.push(np);
    if (prices.length > N) prices.shift();
    var up = dir > 0;
    setMarkerColor(up ? UP : DOWN, up);
    priceLabel.textContent = np.toFixed(1) + (up ? " \u2191" : " \u2193");
  }

  // -- single rAF loop --------------------------------------------------------
  var last = performance.now();
  var lastSample = last;
  function frame(now) {
    var dt = Math.min(0.05, (now - last) / 1000);
    last = now;

    while (now - lastSample >= SAMPLE_MS) { step(); lastSample += SAMPLE_MS; }
    var frac = (now - lastSample) / SAMPLE_MS;

    var m = prices.length, j, xs = new Array(m), ys = new Array(m);
    for (j = 0; j < m; j++) {
      xs[j] = XR - ((m - 1) - j) * SP - frac * SP;
      ys[j] = mapY(prices[j]);
    }
    var yNow = ys[m - 1];
    for (j = 0; j < m - 1; j++) {          // each step: green if it rose, red if it fell
      var seg = segs[j];
      seg.setAttribute("x1", xs[j].toFixed(1));
      seg.setAttribute("y1", ys[j].toFixed(1));
      seg.setAttribute("x2", xs[j + 1].toFixed(1));
      seg.setAttribute("y2", ys[j + 1].toFixed(1));
      seg.setAttribute("stroke", prices[j + 1] >= prices[j] ? UP : DOWN);
    }
    var eseg = segs[m - 1];                 // connect the newest point to the edge marker
    eseg.setAttribute("x1", xs[m - 1].toFixed(1));
    eseg.setAttribute("y1", yNow.toFixed(1));
    eseg.setAttribute("x2", XR);
    eseg.setAttribute("y2", yNow.toFixed(1));
    eseg.setAttribute("stroke", dir > 0 ? UP : DOWN);
    marker.setAttribute("transform", "translate(" + XR + "," + yNow.toFixed(1) + ")");

    for (var ei = 0; ei < eyes.length; ei++) {
      var e = eyes[ei];
      e.nextGaze -= dt;
      if (e.nextGaze <= 0) {
        var ang = rand(0, Math.PI * 2), mag = e.maxOff * Math.sqrt(Math.random()) * rand(0.45, 1);
        e.tx = Math.cos(ang) * mag; e.ty = Math.sin(ang) * mag;
        e.nextGaze = rand(1, 3);
      }
      var ease = Math.min(1, dt * 6);
      e.gx += (e.tx - e.gx) * ease;
      e.gy += (e.ty - e.gy) * ease;
      e.gaze.setAttribute("transform", "translate(" + e.gx.toFixed(2) + "," + e.gy.toFixed(2) + ")");

      if (e.bstate === "idle") {
        e.nextBlink -= dt;
        if (e.nextBlink <= 0) { e.bstate = "closing"; e.bt = 0; }
      } else if (e.bstate === "closing") {
        e.bt += dt; e.p = e.bt / 0.09;
        if (e.p >= 1) { e.p = 1; e.bstate = "opening"; e.bt = 0; }
      } else {
        e.bt += dt; e.p = 1 - e.bt / 0.13;
        if (e.p <= 0) { e.p = 0; e.bstate = "idle"; e.nextBlink = rand(3, 7); }
      }
      if (e.bstate !== "idle" || e.p > 0) {
        var hh = e.h * e.p;
        e.topLid.setAttribute("height", hh);
        e.botLid.setAttribute("y", e.h - hh);
        e.botLid.setAttribute("height", hh);
      }
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
